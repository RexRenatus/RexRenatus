<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 480" width="1280" height="480">
  <rect width="1280" height="480" fill="#1a1a2e"/>

  <text x="60" y="60" font-family="Inter, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#d4af37" letter-spacing="6">— F L U E N C Y   T R A C K E R —</text>
  <text x="60" y="86" font-family="Georgia, serif" font-size="14" font-style="italic" fill="#a8a4b8">Current level → target level. Updated quarterly.</text>
  <line x1="60" y1="100" x2="1220" y2="100" stroke="#d4af37" stroke-width="0.7" opacity="0.45"/>

  <!-- Column headers -->
  <text x="60" y="140" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#c9b037" letter-spacing="2">LANGUAGE</text>
  <text x="380" y="140" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#c9b037" letter-spacing="2">NOW</text>
  <text x="480" y="140" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#c9b037" letter-spacing="2">TARGET</text>
  <text x="620" y="140" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#c9b037" letter-spacing="2">PROGRESS</text>
  <text x="1150" y="140" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#c9b037" letter-spacing="2">%</text>

  <!-- Row template: panel + content -->
  <!-- Spanish -->
  <g transform="translate(40 165)">
    <rect width="1200" height="58" rx="6" fill="#1f1f38"/>
    <rect width="4" height="58" rx="2" fill="#d4af37"/>
    <text x="24" y="36" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#f0e6d3">Spanish 🇪🇸</text>
    <text x="340" y="36" font-family="Inter, sans-serif" font-size="18" fill="#f0e6d3" font-weight="600">A2</text>
    <text x="440" y="36" font-family="Inter, sans-serif" font-size="18" fill="#d4af37" font-weight="700">C1</text>
    <!-- progress bar -->
    <rect x="580" y="22" width="500" height="16" rx="8" fill="#0f0f1e" stroke="#c9b037" stroke-width="0.8"/>
    <rect x="580" y="22" width="100" height="16" rx="8" fill="#d4af37"/>
    <text x="1110" y="36" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#d4af37">20%</text>
  </g>

  <!-- Japanese -->
  <g transform="translate(40 233)">
    <rect width="1200" height="58" rx="6" fill="#1f1f38"/>
    <rect width="4" height="58" rx="2" fill="#d4af37"/>
    <text x="24" y="36" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#f0e6d3">Japanese 🇯🇵</text>
    <text x="340" y="36" font-family="Inter, sans-serif" font-size="18" fill="#f0e6d3" font-weight="600">A2</text>
    <text x="440" y="36" font-family="Inter, sans-serif" font-size="18" fill="#d4af37" font-weight="700">C1</text>
    <rect x="580" y="22" width="500" height="16" rx="8" fill="#0f0f1e" stroke="#c9b037" stroke-width="0.8"/>
    <rect x="580" y="22" width="100" height="16" rx="8" fill="#d4af37"/>
    <text x="1110" y="36" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#d4af37">20%</text>
  </g>

  <!-- Chinese -->
  <g transform="translate(40 301)">
    <rect width="1200" height="58" rx="6" fill="#1f1f38"/>
    <rect width="4" height="58" rx="2" fill="#d4af37"/>
    <text x="24" y="36" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#f0e6d3">Chinese 🇨🇳</text>
    <text x="340" y="36" font-family="Inter, sans-serif" font-size="18" fill="#f0e6d3" font-weight="600">A1</text>
    <text x="440" y="36" font-family="Inter, sans-serif" font-size="18" fill="#d4af37" font-weight="700">C1</text>
    <rect x="580" y="22" width="500" height="16" rx="8" fill="#0f0f1e" stroke="#c9b037" stroke-width="0.8"/>
    <rect x="580" y="22" width="50" height="16" rx="8" fill="#d4af37"/>
    <text x="1110" y="36" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#d4af37">10%</text>
  </g>

  <!-- Korean -->
  <g transform="translate(40 369)">
    <rect width="1200" height="58" rx="6" fill="#1f1f38"/>
    <rect width="4" height="58" rx="2" fill="#d4af37"/>
    <text x="24" y="36" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#f0e6d3">Korean 🇰🇷</text>
    <text x="340" y="36" font-family="Inter, sans-serif" font-size="18" fill="#f0e6d3" font-weight="600">A1</text>
    <text x="440" y="36" font-family="Inter, sans-serif" font-size="18" fill="#d4af37" font-weight="700">C1</text>
    <rect x="580" y="22" width="500" height="16" rx="8" fill="#0f0f1e" stroke="#c9b037" stroke-width="0.8"/>
    <rect x="580" y="22" width="50" height="16" rx="8" fill="#d4af37"/>
    <text x="1110" y="36" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#d4af37">10%</text>
  </g>
</svg>
