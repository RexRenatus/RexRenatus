<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400" width="1280" height="400">
  <rect width="1280" height="400" fill="#1a1a2e"/>

  <text x="60" y="60" font-family="Inter, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#d4af37" letter-spacing="6">— F E A T U R E D   P R O J E C T —</text>
  <line x1="60" y1="78" x2="1220" y2="78" stroke="#d4af37" stroke-width="0.7" opacity="0.45"/>

  <!-- Card -->
  <g transform="translate(60 110)">
    <rect width="1160" height="260" rx="8" fill="#1f1f38" stroke="#d4af37" stroke-width="1.5"/>
    <rect width="6" height="260" rx="3" fill="#d4af37"/>

    <text x="32" y="56" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="700" fill="#d4af37">🏛 Language-Learning-V2</text>

    <!-- Stat pills -->
    <g transform="translate(32 78)">
      <rect width="190" height="30" rx="4" fill="#2a2348" stroke="#c9b037" stroke-width="0.8"/>
      <text x="14" y="20" font-family="Inter, sans-serif" font-size="12" fill="#c9b037" font-weight="700" letter-spacing="1">CARDS:</text>
      <text x="76" y="20" font-family="Inter, sans-serif" font-size="13" fill="#f0e6d3" font-weight="700">171,857</text>
    </g>
    <g transform="translate(232 78)">
      <rect width="160" height="30" rx="4" fill="#2a2348" stroke="#c9b037" stroke-width="0.8"/>
      <text x="14" y="20" font-family="Inter, sans-serif" font-size="12" fill="#c9b037" font-weight="700" letter-spacing="1">DECKS:</text>
      <text x="80" y="20" font-family="Inter, sans-serif" font-size="13" fill="#f0e6d3" font-weight="700">37</text>
    </g>
    <g transform="translate(402 78)">
      <rect width="200" height="30" rx="4" fill="#2a2348" stroke="#c9b037" stroke-width="0.8"/>
      <text x="14" y="20" font-family="Inter, sans-serif" font-size="12" fill="#c9b037" font-weight="700" letter-spacing="1">LANGS:</text>
      <text x="76" y="20" font-family="Inter, sans-serif" font-size="13" fill="#f0e6d3" font-weight="700">ES · JP · ZH · KR</text>
    </g>
    <g transform="translate(612 78)">
      <rect width="220" height="30" rx="4" fill="linear-gradient(90deg,#c9b037,#f4d76f)" stroke="#d4af37" stroke-width="0.8"/>
      <rect width="220" height="30" rx="4" fill="#d4af37"/>
      <text x="110" y="20" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#1a1a2e" font-weight="700" letter-spacing="1">100% AoL THEME · GEMINI REASONING</text>
    </g>

    <!-- Description -->
    <text x="32" y="148" font-family="Georgia, serif" font-size="16" fill="#f0e6d3">Multilingual flashcards hosted on GCS for direct Anki import.</text>
    <text x="32" y="172" font-family="Georgia, serif" font-size="15" fill="#a8a4b8">Vocabulary, function words, grammar patterns, sentence-mining, conjugation,</text>
    <text x="32" y="192" font-family="Georgia, serif" font-size="15" fill="#a8a4b8">counters, synonyms, honorifics — all in the Imperial Golden Age theme.</text>
    <text x="32" y="222" font-family="Georgia, serif" font-size="15" font-style="italic" fill="#d4af37">Every interactive card carries a Gemini-generated</text>
    <text x="357" y="222" font-family="Georgia, serif" font-size="15" font-style="italic" fill="#d4af37" font-weight="700">— W H Y —</text>
    <text x="446" y="222" font-family="Georgia, serif" font-size="15" font-style="italic" fill="#d4af37">reasoning block.</text>

    <!-- Repo URL pill -->
    <g transform="translate(32 240)">
      <rect width="430" height="22" rx="3" fill="#2a2348" stroke="#c9b037" stroke-width="0.6"/>
      <text x="14" y="15" font-family="Menlo,Consolas,monospace" font-size="11" fill="#d4af37">github.com/RexRenatus/Language-Learning-V2</text>
    </g>
  </g>
</svg>
