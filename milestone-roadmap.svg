      <text x="300"  y="29">B1.2</text>
      <text x="540"  y="29">B1</text>
      <text x="800"  y="29">B1</text>
      <text x="1040" y="29">B1</text>
    </g>
    <g transform="translate(40 318)">
      <rect width="1200" height="44" rx="4" fill="#1c1c34"/>
      <text x="40"   y="29" fill="#c9b037" font-weight="700">Q2 2027</text>
      <text x="300"  y="29">B1+</text>
      <text x="540"  y="29">B1+</text>
      <text x="800"  y="29">B1+</text>
      <text x="1040" y="29">B1+</text>
    </g>
    <g transform="translate(40 366)">
      <rect width="1200" height="44" rx="4" fill="#1f1f38"/>
      <text x="40"   y="29" fill="#c9b037" font-weight="700">Q3 2027</text>
      <text x="300"  y="29">B2.1</text>
      <text x="540"  y="29">B2.1</text>
      <text x="800"  y="29">B2.1</text>
      <text x="1040" y="29">B2.1</text>
    </g>
    <g transform="translate(40 414)">
      <rect width="1200" height="44" rx="4" fill="#1c1c34"/>
      <text x="40"   y="29" fill="#c9b037" font-weight="700">Q4 2027</text>
      <text x="300"  y="29">B2.2</text>
      <text x="540"  y="29">B2.2</text>
      <text x="800"  y="29">B2.2</text>
      <text x="1040" y="29">B2.2</text>
    </g>
    <g transform="translate(40 462)">
      <rect width="1200" height="44" rx="4" fill="#1f1f38"/>
      <text x="40"   y="29" fill="#c9b037" font-weight="700">Q1 2028</text>
      <text x="300"  y="29">B2+</text>
      <text x="540"  y="29">B2+</text>
      <text x="800"  y="29">B2+</text>
      <text x="1040" y="29">B2+</text>
    </g>
    <g transform="translate(40 510)">
      <rect width="1200" height="44" rx="4" fill="#1c1c34"/>
      <text x="40"   y="29" fill="#c9b037" font-weight="700">Q2 2028</text>
      <text x="300"  y="29">C1.1</text>
      <text x="540"  y="29">C1.1</text>
      <text x="800"  y="29">C1.1</text>
      <text x="1040" y="29">C1.1</text>
    </g>
    <g transform="translate(40 558)">
      <rect width="1200" height="44" rx="4" fill="#1f1f38"/>
      <text x="40"   y="29" fill="#c9b037" font-weight="700">Q3 2028</text>
      <text x="300"  y="29">C1.2</text>
      <text x="540"  y="29">C1.2</text>
      <text x="800"  y="29">C1.2</text>
      <text x="1040" y="29">C1.2</text>
    </g>
    <!-- Goal row highlighted -->
    <g transform="translate(40 606)">
      <rect width="1200" height="50" rx="6" fill="#1a2e26" stroke="#4ec27e" stroke-width="1.5"/>
      <rect width="4" height="50" rx="2" fill="#4ec27e"/>
      <text x="40"   y="32" fill="#b6e6c8" font-weight="700">Q4 2028</text>
      <text x="300"  y="32" fill="#d4af37" font-weight="800">C1 ✓</text>
      <text x="540"  y="32" fill="#d4af37" font-weight="800">C1 ✓</text>
      <text x="800"  y="32" fill="#d4af37" font-weight="800">C1 ✓</text>
      <text x="1040" y="32" fill="#d4af37" font-weight="800">C1 ✓</text>
