<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 380" width="1280" height="380">
  <rect width="1280" height="380" fill="#1a1a2e"/>

  <text x="60" y="60" font-family="Inter, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#d4af37" letter-spacing="6">— D A I L Y   P R A C T I C E   R I T U A L —</text>
  <text x="60" y="86" font-family="Georgia, serif" font-size="14" font-style="italic" fill="#a8a4b8">The brain needs time + repetition to weave fluency. Three threads, every day.</text>
  <line x1="60" y1="100" x2="1220" y2="100" stroke="#d4af37" stroke-width="0.7" opacity="0.45"/>

  <!-- Card 1: Anki reviews -->
  <g transform="translate(60 130)">
    <rect width="370" height="210" rx="6" fill="#1f1f38"/>
    <rect width="4" height="210" rx="2" fill="#d4af37"/>
    <text x="24" y="48" font-family="Inter, sans-serif" font-size="36">🔁</text>
    <text x="24" y="100" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#d4af37" letter-spacing="3">ANKI REVIEWS</text>
    <text x="24" y="140" font-family="Georgia, serif" font-size="16" fill="#f0e6d3">Vocab-MCQ — the active set:</text>
    <text x="24" y="162" font-family="Georgia, serif" font-size="15" fill="#a8a4b8">Recognition + Recall, 5 languages,</text>
    <text x="24" y="180" font-family="Georgia, serif" font-size="15" fill="#a8a4b8">full A1–B2. Other decks remain</text>
    <text x="24" y="198" font-family="Georgia, serif" font-size="15" fill="#a8a4b8">pending quality review.</text>
  </g>

  <!-- Card 2: Reading -->
  <g transform="translate(455 130)">
    <rect width="370" height="210" rx="6" fill="#1f1f38"/>
    <rect width="4" height="210" rx="2" fill="#d4af37"/>
    <text x="24" y="48" font-family="Inter, sans-serif" font-size="36">📖</text>
    <text x="24" y="100" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#d4af37" letter-spacing="3">30 MIN READING · per lang</text>
    <text x="24" y="140" font-family="Georgia, serif" font-size="16" fill="#f0e6d3">Focused reading in authentic</text>
    <text x="24" y="162" font-family="Georgia, serif" font-size="15" fill="#a8a4b8">context — recognition reps where</text>
    <text x="24" y="180" font-family="Georgia, serif" font-size="15" fill="#a8a4b8">vocabulary lives, not in isolation.</text>
  </g>

  <!-- Card 3: Audiobook -->
  <g transform="translate(850 130)">
    <rect width="370" height="210" rx="6" fill="#1f1f38"/>
    <rect width="4" height="210" rx="2" fill="#d4af37"/>
    <text x="24" y="48" font-family="Inter, sans-serif" font-size="36">🎧</text>
    <text x="24" y="100" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#d4af37" letter-spacing="3">HARRY POTTER · 2× SPEED</text>
    <text x="24" y="140" font-family="Georgia, serif" font-size="16" fill="#f0e6d3">Passive sound-recognition —</text>
    <text x="24" y="162" font-family="Georgia, serif" font-size="15" fill="#a8a4b8">building the auditory map for all</text>
    <text x="24" y="180" font-family="Georgia, serif" font-size="15" fill="#a8a4b8">five phonetic systems in parallel.</text>
  </g>
</svg>
