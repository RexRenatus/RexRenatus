  <rect width="1280" height="360" fill="url(#bg)"/>
  <rect x="20" y="20" width="1240" height="320" fill="none" stroke="#d4af37" stroke-width="2" rx="6"/>
  <rect x="28" y="28" width="1224" height="304" fill="none" stroke="#c9b037" stroke-width="1" rx="4" opacity="0.55"/>

  <text x="640" y="135" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="68" font-weight="700" fill="#d4af37" letter-spacing="10">REX RENATUS</text>
  <rect x="380" y="155" width="520" height="2" fill="url(#goldline)"/>

  <text x="640" y="205" text-anchor="middle" font-family="Georgia, serif" font-size="21" font-style="italic" fill="#f0e6d3">Polyglot in training — Spanish · Japanese · Chinese · Korean · French</text>
  <text x="640" y="240" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#c9b037">Target: <tspan font-weight="700" fill="#d4af37">CEFR C1</tspan> in all five by <tspan font-weight="700" fill="#d4af37">December 2028</tspan></text>

