<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" width="1280" height="360">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#161629"/>
    </linearGradient>
    <linearGradient id="goldline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a1a2e" stop-opacity="0"/>
      <stop offset="20%" stop-color="#d4af37"/>
      <stop offset="80%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#1a1a2e" stop-opacity="0"/>
